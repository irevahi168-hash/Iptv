<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyfriend on Demand Ep 1 - Premium Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navbar Style */
        header {
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #E50914; /* Netflix Red vibe */
            letter-spacing: 1px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Video Box Styling */
        .video-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #222;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Info Section */
        .video-info {
            padding: 20px;
        }

        .video-info h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #fff;
        }

        .badge {
            background: #E50914;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            margin-right: 10px;
        }

        .description {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
            line-height: 1.6;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 30px;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>STREAMHUB</header>

    <div class="main-container">
        <div class="video-card">
            <div class="video-wrapper">
                <iframe 
                    src="https://www.dailymotion.com/embed/video/xa1g56e?ui-logo=false&ui-start-screen-info=false&autoplay=0" 
                    allowfullscreen 
                    allow="autoplay; picture-in-picture">
                </iframe>
            </div>

            <div class="video-info">
                <span class="badge">New Episode</span>
                <span class="badge" style="background: #333;">HD</span>
                <h1>Boyfriend on Demand Ep 1</h1>
                <p class="description">
                    Watch the latest episode of "Boyfriend on Demand". Experience high-quality streaming with a modern interface.
                </p>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 StreamHub Digital. All Rights Reserved.</footer>

</body>
</html>
