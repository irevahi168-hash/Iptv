<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুধুমাত্র সাথীর জন্য</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #080808; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; padding: 40px 20px 20px; text-align: center; background: linear-gradient(to bottom, rgba(255, 77, 77, 0.15), transparent); }
        header h1 { font-size: 32px; color: #ff4d4d; text-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }

        .container { width: 100%; max-width: 900px; padding: 0 15px; margin-bottom: 50px; flex: 1; }

        /* Video Player Box with Loading Overlay */
        .video-box { 
            background: #111; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); 
            position: relative; 
        }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Text Section */
        .video-details { padding: 25px; text-align: center; background: #161616; border-top: 1px solid #222; }
        .video-details h2 { font-size: 20px; color: #fff; margin-bottom: 10px; font-weight: 600; }

        /* Playlist Styling */
        .playlist-header { margin: 40px 0 20px; font-size: 20px; color: #ff4d4d; font-weight: 600; text-align: left; width: 100%; letter-spacing: 1px; }
        .episode-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 15px; 
            width: 100%; 
        }

        .ep-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
            color: #bbb;
            font-weight: 600;
        }

        .ep-card:hover { background: #333; color: #fff; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255, 77, 77, 0.2); }
        .ep-card.active { background: #ff4d4d; color: #fff; border-color: #ff4d4d; font-weight: bold; box-shadow: 0 5px 20px rgba(255, 77, 77, 0.4); }

        /* Special Heartbeat Animation */
        .heart-icon { color: #ff4d4d; font-size: 22px; margin-top: 15px; animation: heartbeat 1.5s infinite; display: inline-block; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        footer { width: 100%; padding: 40px; color: #444; font-size: 13px; letter-spacing: 2px; text-align: center; background: linear-gradient(to top, rgba(0,0,0,0.5), transparent); }

        /* LOADING OVERLAY (Shathi Special) */
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        .loading-content {
            text-align: center;
        }

        .love-text {
            font-size: 24px;
            color: #ff4d4d;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
            animation: fadeInText 1s ease-in-out;
        }

        .love-heart {
            font-size: 60px;
            color: #ff4d4d;
            animation: loveHeartbeat 1.2s infinite;
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loveHeartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Responsive Fix for Mobile Overlay Text */
        @media (max-width: 600px) {
            .love-text { font-size: 18px; }
            .love-heart { font-size: 50px; }
        }

    </style>
</head>
<body>

    <header>
        <h1>শুধুমাত্র সাথীর জন্য</h1>
    </header>

    <div class="container">
        <div class="video-box" id="videoBox">
            
            <div id="loadingOverlay">
                <div class="loading-content">
                    <div class="love-text">I Love You Shathi</div>
                    <div class="love-heart">❤️</div>
                </div>
            </div>

            <div class="video-wrapper">
                <iframe id="mainPlayer" src="" allowfullscreen allow="autoplay"></iframe>
            </div>
            
            <div class="video-details">
                <h2 id="currentTitle">Boyfriend on Demand - Episode 1</h2>
                <div class="heart-icon">❤️</div>
            </div>
        </div>

        <div class="playlist-header">এপিসোড লিস্ট</div>
        <div class="episode-grid" id="playlist">
            </div>
    </div>

    <footer>MADE WITH LOVE FOR SHATHI</footer>

    <script>
        const episodes = [
            { id: 'xa1g56e', title: 'Episode 1' },
            { id: 'xa1ga5g', title: 'Episode 2' },
            { id: 'xa1gaai', title: 'Episode 3' },
            { id: 'xa1gaz4', title: 'Episode 4' },
            { id: 'xa1gbaq', title: 'Episode 5' },
            { id: 'xa1gana', title: 'Episode 6' },
            { id: 'xa1gbl6', title: 'Episode 7' },
            { id: 'xa1nytw', title: 'Episode 8' },
            { id: 'xa1gc3q', title: 'Episode 9' },
            { id: 'xa1gcka', title: 'Episode 10' }
        ];

        const playlistContainer = document.getElementById('playlist');
        const player = document.getElementById('mainPlayer');
        const titleDisplay = document.getElementById('currentTitle');
        const overlay = document.getElementById('loadingOverlay');

        function showLoading() {
            // Show overlay, then load video
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';

            // Auto-hide after 3 seconds (adjust as needed)
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500); // Wait for fade-out animation
            }, 3000);
        }

        function loadPlaylist() {
            // Load Episode 1 on start with animation
            player.src = `https://www.dailymotion.com/embed/video/${episodes[0].id}?ui-logo=false&autoplay=1`;
            showLoading();

            episodes.forEach((ep, index) => {
                const card = document.createElement('div');
                card.className = 'ep-card' + (index === 0 ? ' active' : '');
                card.innerText = 'EP ' + (index + 1);
                
                card.onclick = (e) => {
                    // Update Player with new source
                    player.src = `https://www.dailymotion.com/embed/video/${ep.id}?ui-logo=false&autoplay=1`;
                    titleDisplay.innerText = `Boyfriend on Demand - ${ep.title}`;
                    
                    // Show Shathi Special Animation
                    showLoading();

                    // Update Active Class
                    document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    // Smooth scroll to video box (mobile friendly)
                    document.getElementById('videoBox').scrollIntoView({ behavior: 'smooth' });
                };
                playlistContainer.appendChild(card);
            });
        }

        loadPlaylist();
    </script>
</body>
</html>
