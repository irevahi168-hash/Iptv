<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile M3U Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: #222; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        #player-container { width: 100%; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        #list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; }
        .channel-item:active { background: #333; }
        .channel-item img { width: 40px; height: 40px; margin-right: 15px; border-radius: 5px; object-fit: contain; }
    </style>
</head>
<body>

<header>MY IPTV PLAYER</header>

<div id="player-container">
    <video id="video" controls></video>
</div>

<div id="list">Loading channels...</div>

<script>
    // --- KHUB GURUTTOPURNO ---
    // Ekhane apnar GitHub-e thaka M3U file-er RAW link-ti boshun
    const M3U_URL = 'APNAR_GITHUB_RAW_LINK_HERE';

    const video = document.getElementById('video');
    const listContainer = document.getElementById('list');

    async function loadPlaylist() {
        try {
            const response = await fetch(M3U_URL);
            const data = await response.text();
            parseM3U(data);
        } catch (err) {
            listContainer.innerText = "Error loading playlist!";
        }
    }

    function parseM3U(data) {
        const lines = data.split('\n');
        let channels = [];
        let currentChannel = {};

        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                const name = line.split(',')[1];
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                currentChannel = { name: name, logo: logoMatch ? logoMatch[1] : '' };
            } else if (line.startsWith('http')) {
                currentChannel.url = line.trim();
                channels.push(currentChannel);
            }
        });

        renderChannels(channels);
    }

    function renderChannels(channels) {
        listContainer.innerHTML = '';
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerHTML = `<img src="${ch.logo || 'https://via.placeholder.com/40'}"> <span>${ch.name}</span>`;
            div.onclick = () => playStream(ch.url);
            listContainer.appendChild(div);
        });
    }

    function playStream(url) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    loadPlaylist();
</script>
</body>
</html>
